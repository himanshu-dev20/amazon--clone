<!DOCTYPE html>
<html>
<head>
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">Amazon</div>
        <input type="text" placeholder="Search Amazon">
        <div class="nav-links">
            <p>Sign In</p>
            <p>Orders</p>
        </div>
    </div>

    <!-- Banner -->
    <div class="banner">
        <h1>Welcome to Amazon</h1>
        <p>Best deals for you</p>
    </div>

    <!-- Products Section -->
    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Product 1</h3>
            <p>₹999</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Product 2</h3>
            <p>₹1499</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Product 3</h3>
            <p>₹799</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Product 4</h3>
            <p>₹1299</p>
        </div>

    </div>

</body>
</html>
